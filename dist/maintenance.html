<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse - Back Soon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0f0f0f;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}
.container {
  text-align: center;
  padding: 40px;
  max-width: 500px;
}
.logo {
  font-size: 48px;
  font-weight: 800;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.subtitle {
  color: #64748b;
  font-size: 14px;
  margin-bottom: 40px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.icon {
  font-size: 60px;
  margin-bottom: 24px;
}
h2 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 16px;
  color: #f1f5f9;
}
p {
  color: #94a3b8;
  line-height: 1.6;
  font-size: 15px;
}
.glow {
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <div class="logo">PULSE</div>
  <div class="subtitle">by DarkWave Studios</div>
  <div class="icon">🔧</div>
  <h2>We'll Be Back Soon</h2>
  <p>We're performing some upgrades to bring you a better experience. Please check back shortly.</p>
</div>
</body>
</html>
